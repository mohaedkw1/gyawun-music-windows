name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app (Release)
        run: flutter build windows --release

      - name: Create portable ZIP
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath GyawunMusic-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.18-windows
          name: Gyawun Music v2.0.18 (Windows)
          body: |
            Gyawun Music - Ad-free YouTube Music Streaming for Windows
            
            System Requirements: Windows 10+ (64-bit)
          files: GyawunMusic-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
