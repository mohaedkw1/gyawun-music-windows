name: Windows Release

on:
  push:
    tags:
      - 'v*-win.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.18)'
        required: true
        default: '2.0.18'
      channel:
        description: 'Release channel (stable/beta)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      release_tag: ${{ steps.app_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read FVM version
        id: fvm_version
        shell: pwsh
        run: |
          $config = Get-Content .fvm/fvm_config.json | ConvertFrom-Json
          $version = $config.flutterSdkVersion
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Flutter version from FVM: $version"

      - name: Setup Flutter with FVM
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3

      - name: Read and validate version
        id: app_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            $TAG = "${{ github.ref_name }}"
            $VERSION = $TAG -replace '^v','' -replace '-win.*',''
          }
          $VERSION_CODE = (Select-String -Path pubspec.yaml -Pattern '^version:' | ForEach-Object { $_.Line.Split('+')[1] })
          if ([string]::IsNullOrEmpty($VERSION_CODE)) { $VERSION_CODE = "1" }

          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "build=$VERSION_CODE" >> $env:GITHUB_OUTPUT
          echo "Windows version: $VERSION+$VERSION_CODE"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization files
        run: dart run intl_utils:generate

      - name: Build Windows app (Release)
        run: flutter build windows --release

      - name: Verify build output
        shell: pwsh
        run: |
          $buildPath = ".\build\windows\x64\runner\Release"
          if (Test-Path "$buildPath\gyawun.exe") {
            Write-Host "Build output found!"
            Get-ChildItem $buildPath -Recurse | Format-Table Name, Length -AutoSize
          } else {
            Write-Error "Build output not found!"
            exit 1
          }

      # ======================================================================
      # Install Inno Setup for .exe installer
      # ======================================================================
      - name: Install Inno Setup
        shell: pwsh
        run: |
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $innoInstaller = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoInstaller
          Start-Process -FilePath $innoInstaller -ArgumentList "/VERYSILENT /NORESTART" -Wait
          Write-Host "Inno Setup installed"

      - name: Create .exe installer
        shell: pwsh
        run: |
          $innoPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.app_version.outputs.version }}"

          if (Test-Path $innoPath) {
            & $innoPath ".\installer\gyawun_setup.iss" /DMyAppVersion=$version /O".\releases"
            Write-Host "Inno Setup compilation completed"
          } else {
            Write-Error "Inno Setup not found at $innoPath"
            exit 1
          }

      # ======================================================================
      # Install WiX for .msi installer
      # ======================================================================
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix --version
          Write-Host "WiX Toolset installed"

      - name: Create .msi installer
        shell: pwsh
        run: |
          $version = "${{ steps.app_version.outputs.version }}"
          Write-Host "Building MSI installer..."

          # First, we need to harvest the files from the build output
          # Create a dynamic WiX fragment with all files
          $buildDir = ".\build\windows\x64\runner\Release"
          $harvestScript = ".\installer\harvest_files.wxs"

          # Use heat to harvest files
          wix heat dir $buildDir -cg ReleaseFiles -dr INSTALLFOLDER -sreg -srd -var var.SourceDir -out $harvestScript -t .\installer\heat_transform.xslt

          # Build the MSI
          wix build .\installer\gyawun_setup.wxs $harvestScript -out ".\releases\Setup.msi" -arch x64 -d SourceDir="$buildDir"

          Write-Host "WiX MSI build completed"

      # ======================================================================
      # Upload artifacts
      # ======================================================================
      - name: Rename and organize artifacts
        shell: pwsh
        run: |
          $V = "${{ steps.app_version.outputs.version }}"
          New-Item -ItemType Directory -Path ".\releases" -Force

          # Rename exe if needed
          $exeFile = Get-ChildItem ".\releases\GyawunMusic-Setup-*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exeFile) {
            $newName = "GyawunMusic-Setup-v${V}.exe"
            if ($exeFile.Name -ne $newName) {
              Rename-Item $exeFile.FullName $newName
            }
            Write-Host "EXE Installer: $newName"
          }

          # Rename msi if needed
          $msiFile = Get-Item ".\releases\Setup.msi" -ErrorAction SilentlyContinue
          if ($msiFile) {
            $newName = "GyawunMusic-v${V}-Setup.msi"
            Rename-Item $msiFile.FullName $newName
            Write-Host "MSI Installer: $newName"
          }

          # Also zip the raw build for portable use
          Compress-Archive -Path ".\build\windows\x64\runner\Release\*" -DestinationPath ".\releases\GyawunMusic-v${V}-Portable.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GyawunMusic-Windows-v${{ steps.app_version.outputs.version }}
          path: releases/
          retention-days: 30

      # ======================================================================
      # Create GitHub Release
      # ======================================================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}-win.1', steps.app_version.outputs.version) }}
          name: Windows v${{ steps.app_version.outputs.version }}
          body: |
            ## Gyawun Music - Windows Release v${{ steps.app_version.outputs.version }}

            Ad-free YouTube Music streaming and download app for Windows.

            ---

            ### Downloads

            | File | Description |
            |------|-------------|
            | `GyawunMusic-Setup-v${{ steps.app_version.outputs.version }}.exe` | **Recommended** - Full installer with auto-update support |
            | `GyawunMusic-v${{ steps.app_version.outputs.version }}-Setup.msi` | MSI installer for enterprise/deployment |
            | `GyawunMusic-v${{ steps.app_version.outputs.version }}-Portable.zip` | Portable version (no installation required) |

            ---

            ### System Requirements
            - Windows 10 (64-bit) or later
            - Microsoft Visual C++ Redistributable 2022 (auto-installed with .exe installer)

            ---

            ### Installation
            1. Download the `.exe` installer (recommended) or `.msi` for enterprise deployment
            2. Run the installer and follow the prompts
            3. Launch Gyawun Music from your Start Menu or Desktop

            ---

            ### Build Information
            - **Version:** `${{ steps.app_version.outputs.version }}`
            - **Build Number:** `${{ steps.app_version.outputs.build }}`
            - **Flutter SDK:** `${{ steps.fvm_version.outputs.version }}`
            - **Platform:** Windows x64
          files: |
            releases/GyawunMusic-Setup-v${{ steps.app_version.outputs.version }}.exe
            releases/GyawunMusic-v${{ steps.app_version.outputs.version }}-Setup.msi
            releases/GyawunMusic-v${{ steps.app_version.outputs.version }}-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
