name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app (Release)
        run: flutter build windows --release

      - name: Create output directory
        run: mkdir -p releases

      - name: Create portable ZIP
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath releases\GyawunMusic-Portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GyawunMusic-Windows
          path: releases/
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.18-windows
          name: Gyawun Music v2.0.18 (Windows)
          body: |
            ## Gyawun Music - Windows v2.0.18
            
            Ad-free YouTube Music streaming app for Windows.
            
            ### Downloads
            - `GyawunMusic-Portable.zip` - Portable version (extract and run)
            
            ### System Requirements
            - Windows 10 (64-bit) or later
            - Internet connection
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
